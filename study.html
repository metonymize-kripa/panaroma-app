<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study — panorama.ink</title>

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#F7A900">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F5F7;
      --surface: #FFFFFF;
      --text: #1D1D1F;
      --text-secondary: #6E6E73;
      --accent: #007AFF;
      --green: #30D158;
      --yellow: #FF9F0A;
      --red: #FF453A;
      --border: #D2D2D7;
      --radius: 20px;
    }

    html, body {
      height: 100%;
      height: 100dvh;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(245,245,247,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      color: var(--accent);
      text-decoration: none;
      font-size: 17px;
      min-width: 60px;
      -webkit-tap-highlight-color: transparent;
    }

    .header-center { text-align: center; }

    .header-title {
      font-size: 15px;
      font-weight: 600;
    }

    .header-sub {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .header-right { min-width: 60px; text-align: right; }

    /* ── Progress strip ── */
    .progress-strip {
      height: 3px;
      background: var(--border);
      flex-shrink: 0;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.4s ease;
    }

    /* ── Main ── */
    /* Fixed 3-zone layout: card zone grows, buttons stay pinned */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* ── Card zone ── */
    .card-zone {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px 12px;
      min-height: 0;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      width: 100%;
      max-width: 560px;
      padding: 32px 28px 28px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .card-tag {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .card-line1 {
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 20px;
      line-height: 1.55;
      color: var(--text);
      margin-bottom: 8px;
    }

    .card-line2 {
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 20px;
      line-height: 1.55;
      color: var(--text);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .card-line2.revealed {
      opacity: 1;
      transform: none;
    }

    .card-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 18px 0 6px;
      transition: opacity 0.2s;
    }

    .card-divider.hidden { opacity: 0; pointer-events: none; }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .tap-hint {
      font-size: 12px;
      color: var(--border);
      white-space: nowrap;
    }

    /* Poem attribution (revealed) */
    .card-attr {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.25s ease 0.1s, transform 0.25s ease 0.1s;
    }

    .card-attr.revealed {
      opacity: 1;
      transform: none;
    }

    .attr-text {
      font-size: 12px;
      color: var(--text-secondary);
      font-style: italic;
    }

    .attr-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Rating zone — always pinned at bottom ── */
    .rating-zone {
      flex-shrink: 0;
      padding: 8px 16px 24px;
      background: var(--bg);
      display: none; /* hidden until card revealed */
    }

    .rating-zone.visible { display: block; }

    .rating-label {
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .rating-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .rate-btn {
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .rate-btn:active { opacity: 0.8; transform: scale(0.97); }

    .rate-btn.again { background: #FFE5E4; color: var(--red); }
    .rate-btn.good  { background: #E3F9EC; color: #1A7F3C; }

    .rate-btn .btn-sub {
      display: block;
      font-size: 12px;
      font-weight: 400;
      margin-top: 2px;
      opacity: 0.65;
    }

    /* ── Done screen ── */
    .done-screen {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      gap: 14px;
    }

    .done-screen.visible { display: flex; }

    .done-icon { font-size: 52px; line-height: 1; }

    .done-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.4px;
    }

    .done-sub {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .done-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 300px;
      margin-top: 8px;
    }

    .btn-done-p {
      display: block;
      padding: 15px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }

    .btn-done-s {
      display: block;
      padding: 13px;
      background: var(--surface);
      color: var(--accent);
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
  </style>
</head>
<body>

<header class="header">
  <a href="index.html" class="back-btn">‹ Back</a>
  <div class="header-center">
    <div class="header-title" id="h-title">Loading…</div>
    <div class="header-sub" id="h-sub"></div>
  </div>
  <div class="header-right"></div>
</header>

<div class="progress-strip">
  <div class="progress-fill" id="prog-fill" style="width:0%"></div>
</div>

<div class="main" id="main">

  <!-- ── Study view ── -->
  <div class="card-zone" id="card-zone">
    <div class="card" id="card" onclick="revealCard()">
      <div class="card-tag" id="card-tag">New</div>
      <div class="card-line1" id="card-line1"></div>
      <div class="card-line2" id="card-line2"></div>

      <div class="card-divider" id="card-divider">
        <div class="divider-line"></div>
        <span class="tap-hint">tap to reveal</span>
        <div class="divider-line"></div>
      </div>

      <div class="card-attr" id="card-attr">
        <span class="attr-text" id="attr-text"></span>
        <a class="attr-link" id="attr-link" href="#" onclick="event.stopPropagation()" target="_blank">read poem ↗</a>
      </div>
    </div>
  </div>

  <!-- ── Rating buttons — always at bottom ── -->
  <div class="rating-zone" id="rating-zone">
    <div class="rating-label">How well did you know the next line?</div>
    <div class="rating-btns">
      <button class="rate-btn again" onclick="rate('again')">
        Again
        <span class="btn-sub">Show soon</span>
      </button>
      <button class="rate-btn good" onclick="rate('good')">
        Got it
        <span class="btn-sub">3+ days</span>
      </button>
    </div>
  </div>

  <!-- ── Done screen ── -->
  <div class="done-screen" id="done-screen">
    <div class="done-icon">🎉</div>
    <div class="done-title">All done</div>
    <div class="done-sub" id="done-sub"></div>
    <div class="done-btns">
      <a href="index.html" class="btn-done-p">Back to home</a>
      <button class="btn-done-s" onclick="restart()">Study again</button>
    </div>
  </div>

</div>

<script>
const COUPLET_KEY = 'panorama_couplets_v1';
const params = new URLSearchParams(location.search);
const browseAll = params.get('mode') === 'all';
const specificPoem = params.get('poem');

let couplets = [];
let queue = [];
let againQueue = [];
let idx = 0;
let reviewed = 0;
let revealed = false;
let progress = {};

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(COUPLET_KEY)) || {}; } catch { return {}; }
}

function saveProgress() {
  localStorage.setItem(COUPLET_KEY, JSON.stringify(progress));
}

function getStatus(id) {
  return (progress[id] && progress[id].status) || 'new';
}

function isDue(id) {
  const c = progress[id];
  if (!c || c.status === 'new') return true;
  if (c.status === 'learning') return true;
  if (c.status === 'known') return Date.now() >= (c.nextReview || 0);
  return true;
}

function computeNext(id, rating) {
  const c = progress[id] || { status: 'new', interval: 1 };
  if (rating === 'again') {
    return { status: 'learning', interval: 1, nextReview: Date.now() };
  } else {
    const interval = c.status === 'known' ? Math.min((c.interval || 1) * 2.5, 60) : 3;
    return { status: 'known', interval, nextReview: Date.now() + interval * 86400000 };
  }
}

async function init() {
  const data = await fetch('couplets.json').then(r => r.json());
  couplets = data;
  progress = loadProgress();

  if (specificPoem) {
    queue = couplets.filter(c => c.poemId === specificPoem);
    const title = queue[0]?.poemTitle || 'Poem';
    document.getElementById('h-title').textContent = title;
  } else if (browseAll) {
    queue = shuffle([...couplets]);
    document.getElementById('h-title').textContent = 'All poems';
  } else {
    queue = couplets.filter(c => isDue(c.id));
    queue.sort((a, b) => {
      const order = { learning: 0, new: 1, known: 2 };
      return (order[getStatus(a.id)] || 1) - (order[getStatus(b.id)] || 1);
    });
    document.getElementById('h-title').textContent = 'Due today';
  }

  if (queue.length === 0) { showDone(); return; }
  showCard();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function current() {
  if (idx < queue.length) return queue[idx];
  if (againQueue.length) return againQueue[0];
  return null;
}

function showCard() {
  const c = current();
  if (!c) { showDone(); return; }

  const done = reviewed;
  const remaining = (queue.length - Math.min(idx, queue.length)) + againQueue.length;
  const total = done + remaining;
  document.getElementById('prog-fill').style.width = total > 0 ? Math.round(done / total * 100) + '%' : '0%';
  document.getElementById('h-sub').textContent = `${done + 1} of ${total}`;

  revealed = false;
  document.getElementById('card-line1').textContent = c.line1;
  document.getElementById('card-line2').textContent = c.line2;
  document.getElementById('card-line2').classList.remove('revealed');
  document.getElementById('card-divider').classList.remove('hidden');
  document.getElementById('card-attr').classList.remove('revealed');
  document.getElementById('rating-zone').classList.remove('visible');

  const status = getStatus(c.id);
  document.getElementById('card-tag').textContent =
    status === 'known' ? 'Review' : status === 'learning' ? 'Still learning' : 'New';

  document.getElementById('attr-text').textContent = `${c.poemTitle} — ${c.author}`;
  document.getElementById('attr-link').href = `poem.html?id=${encodeURIComponent(c.poemId)}`;
}

function revealCard() {
  if (revealed) return;
  revealed = true;
  document.getElementById('card-line2').classList.add('revealed');
  document.getElementById('card-divider').classList.add('hidden');
  document.getElementById('card-attr').classList.add('revealed');
  document.getElementById('rating-zone').classList.add('visible');
}

function rate(rating) {
  const c = current();
  if (!c) return;

  const next = computeNext(c.id, rating);
  progress[c.id] = { ...(progress[c.id] || {}), ...next, reviews: ((progress[c.id] || {}).reviews || 0) + 1 };
  saveProgress();
  reviewed++;

  if (rating === 'again') {
    if (idx < queue.length) { againQueue.push(queue[idx]); idx++; }
    else { const card = againQueue.shift(); againQueue.push(card); }
  } else {
    if (idx < queue.length) idx++;
    else againQueue.shift();
  }

  showCard();
}

function showDone() {
  document.getElementById('card-zone').style.display = 'none';
  document.getElementById('rating-zone').style.display = 'none';
  document.getElementById('done-screen').classList.add('visible');
  document.getElementById('h-title').textContent = 'Done';
  document.getElementById('h-sub').textContent = '';
  document.getElementById('prog-fill').style.width = '100%';

  const p = loadProgress();
  const known = Object.values(p).filter(v => v.status === 'known').length;
  document.getElementById('done-sub').textContent =
    `${reviewed} couplet${reviewed !== 1 ? 's' : ''} reviewed.\n${known.toLocaleString()} of ${couplets.length.toLocaleString()} couplets known.`;
}

function restart() {
  progress = loadProgress();
  idx = 0; reviewed = 0; againQueue = [];
  if (browseAll || specificPoem) {
    queue = specificPoem
      ? shuffle(couplets.filter(c => c.poemId === specificPoem))
      : shuffle([...couplets]);
  } else {
    queue = couplets.filter(c => isDue(c.id));
    if (!queue.length) queue = shuffle([...couplets]);
  }
  document.getElementById('done-screen').classList.remove('visible');
  document.getElementById('card-zone').style.display = '';
  document.getElementById('rating-zone').style.display = '';
  showCard();
}

init();
</script>

</body>
</html>
