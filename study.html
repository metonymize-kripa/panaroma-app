<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study — Panorama</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F5F7;
      --surface: #FFFFFF;
      --text: #1D1D1F;
      --text-secondary: #6E6E73;
      --accent: #007AFF;
      --green: #30D158;
      --yellow: #FF9F0A;
      --red: #FF453A;
      --border: #D2D2D7;
      --radius: 20px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100vh;
    }

    /* Header */
    .header {
      background: rgba(245,245,247,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .back-btn {
      color: var(--accent);
      text-decoration: none;
      font-size: 17px;
      display: flex;
      align-items: center;
      gap: 4px;
      -webkit-tap-highlight-color: transparent;
    }

    .header-center {
      text-align: center;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Progress bar strip */
    .progress-strip {
      height: 3px;
      background: var(--border);
      flex-shrink: 0;
    }

    .progress-strip-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.4s ease;
    }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* Study view — fills the main area */
    #study-view {
      width: 100%;
      max-width: 600px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── FRONT PANEL ── */
    #front-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .front-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 32px 36px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .poem-number {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 20px;
    }

    .front-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .front-author {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .first-line-btn {
      background: var(--bg);
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-secondary);
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .first-line-btn:active { background: var(--border); }

    .first-line-preview {
      font-family: "Georgia", serif;
      font-size: 14px;
      color: var(--text-secondary);
      font-style: italic;
      margin-top: 12px;
      display: none;
    }

    .tap-hint {
      font-size: 13px;
      color: var(--border);
      margin-top: 20px;
    }

    /* ── BACK PANEL ── */
    #back-panel {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #back-panel.visible {
      display: flex;
    }

    .back-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin: 16px 16px 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .card-back-header {
      padding: 20px 24px 12px;
      border-bottom: 1px solid var(--bg);
      flex-shrink: 0;
    }

    .card-back-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .card-back-author {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .poem-text-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 16px;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
    }

    .poem-text {
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
    }

    .card-back-footer {
      padding: 10px 24px 14px;
      border-top: 1px solid var(--bg);
      flex-shrink: 0;
    }

    .full-poem-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── RATING BUTTONS ── */
    .rating-area {
      padding: 14px 16px 20px;
      flex-shrink: 0;
    }

    .rating-label {
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    .rating-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .rate-btn {
      padding: 14px 8px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .rate-btn:active { opacity: 0.8; transform: scale(0.96); }

    .rate-btn.again  { background: #FFE5E4; color: var(--red); }
    .rate-btn.hard   { background: #FFF4E0; color: var(--yellow); }
    .rate-btn.good   { background: #E3F9EC; color: var(--green); }

    .rate-btn .btn-sub {
      display: block;
      font-size: 11px;
      font-weight: 400;
      margin-top: 2px;
      opacity: 0.7;
    }

    /* Done screen */
    .done-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 16px;
    }

    .done-screen.visible { display: flex; }

    .done-icon {
      font-size: 56px;
      line-height: 1;
    }

    .done-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .done-sub {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .done-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      margin-top: 8px;
    }

    .btn-done-primary {
      display: block;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: opacity 0.15s;
    }

    .btn-done-secondary {
      display: block;
      padding: 14px;
      background: var(--surface);
      color: var(--accent);
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>

<header class="header">
  <a href="index.html" class="back-btn">‹ Back</a>
  <div class="header-center">
    <div class="header-title" id="header-title">Loading…</div>
    <div class="header-subtitle" id="header-subtitle"></div>
  </div>
  <div style="width:60px"></div>
</header>

<div class="progress-strip">
  <div class="progress-strip-fill" id="progress-strip-fill" style="width:0%"></div>
</div>

<div class="main" id="main">

  <!-- Study view -->
  <div id="study-view">

    <!-- FRONT: title + author -->
    <div id="front-panel" onclick="flipCard()">
      <div class="front-card">
        <div class="poem-number" id="front-number"></div>
        <div class="front-title" id="front-title"></div>
        <div class="front-author" id="front-author"></div>
        <button class="first-line-btn" id="hint-btn" onclick="event.stopPropagation(); showHint()">Show first line</button>
        <div class="first-line-preview" id="first-line-preview"></div>
        <div class="tap-hint">Tap to reveal</div>
      </div>
    </div>

    <!-- BACK: poem text + rating -->
    <div id="back-panel">
      <div class="back-card">
        <div class="card-back-header">
          <div class="card-back-title" id="back-title"></div>
          <div class="card-back-author" id="back-author"></div>
        </div>
        <div class="poem-text-wrap">
          <div class="poem-text" id="poem-text"></div>
        </div>
        <div class="card-back-footer">
          <a class="full-poem-link" id="full-poem-link" href="#" target="_blank">↗ Read full poem</a>
        </div>
      </div>

      <div class="rating-area">
        <div class="rating-label">How well did you know it?</div>
        <div class="rating-buttons">
          <button class="rate-btn again" onclick="rate('again')">Again<span class="btn-sub">Show soon</span></button>
          <button class="rate-btn hard"  onclick="rate('hard')">Hard<span class="btn-sub">Tomorrow</span></button>
          <button class="rate-btn good"  onclick="rate('good')">Got it<span class="btn-sub">3+ days</span></button>
        </div>
      </div>
    </div>

  </div>

  <!-- Done screen -->
  <div class="done-screen" id="done-screen">
    <div class="done-icon">🎉</div>
    <div class="done-title">Session complete</div>
    <div class="done-sub" id="done-sub"></div>
    <div class="done-btns">
      <a href="index.html" class="btn-done-primary">Back to library</a>
      <button class="btn-done-secondary" onclick="restartSession()">Study again</button>
    </div>
  </div>

</div>

<script>
const STORAGE_KEY = 'panorama_v1';
const params = new URLSearchParams(location.search);
const browseAll = params.get('mode') === 'all';

let poems = [];
let queue = [];
let againQueue = [];
let currentIdx = 0;
let sessionReviewed = 0;
let flipped = false;
let progress = {};

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
}

function isDue(id) {
  const card = progress[id];
  if (!card || card.status === 'new') return true;
  if (card.status === 'learning') return true;
  if (card.status === 'known') return Date.now() >= (card.nextReview || 0);
  return true;
}

function computeNext(card, rating) {
  let interval = card.interval || 1;
  let status = card.status || 'new';

  if (rating === 'again') {
    return { status: 'learning', interval: 1, nextReview: Date.now() };
  } else if (rating === 'hard') {
    return { status: 'learning', interval: 1, nextReview: Date.now() + 86400000 };
  } else { // good
    const newInterval = status === 'known' ? Math.min(interval * 2.5, 60) : 3;
    return {
      status: 'known',
      interval: newInterval,
      nextReview: Date.now() + (newInterval * 86400000)
    };
  }
}

async function init() {
  const res = await fetch('poems.json');
  poems = await res.json();
  progress = loadProgress();

  if (browseAll) {
    queue = [...poems];
  } else {
    queue = poems.filter(p => isDue(p.id));
    // Sort: new first, then learning, then due known
    queue.sort((a, b) => {
      const order = { new: 0, learning: 1, known: 2 };
      return (order[getStatus(a.id)] || 0) - (order[getStatus(b.id)] || 0);
    });
  }

  if (queue.length === 0) {
    showDone();
    return;
  }

  document.getElementById('header-title').textContent = browseAll ? 'Browse all' : 'Due today';
  showCard();
}

function getStatus(id) {
  return (progress[id] && progress[id].status) || 'new';
}

function currentPoem() {
  if (currentIdx < queue.length) return queue[currentIdx];
  if (againQueue.length > 0) return againQueue[0];
  return null;
}

function showCard() {
  const poem = currentPoem();
  if (!poem) { showDone(); return; }

  // Update progress strip
  const total = queue.length + againQueue.length;
  const done = sessionReviewed;
  const pct = total > 0 ? Math.round((done / (done + total - currentIdx - (currentIdx >= queue.length ? 0 : 0))) * 100) : 0;
  // Simpler: pct based on how many we've reviewed vs total queue
  const reviewedCount = sessionReviewed;
  const remaining = (queue.length - Math.min(currentIdx, queue.length)) + againQueue.length;
  const totalEst = reviewedCount + remaining;
  document.getElementById('progress-strip-fill').style.width =
    totalEst > 0 ? Math.round((reviewedCount / totalEst) * 100) + '%' : '0%';

  document.getElementById('header-subtitle').textContent =
    `${reviewedCount + 1} of ${totalEst}`;

  // Reset to front panel
  flipped = false;
  document.getElementById('front-panel').style.display = '';
  document.getElementById('back-panel').classList.remove('visible');

  document.getElementById('front-number').textContent =
    getStatus(poem.id) === 'new' ? 'New poem' :
    getStatus(poem.id) === 'known' ? 'Review' : 'Learning';

  document.getElementById('front-title').textContent = poem.title;
  document.getElementById('front-author').textContent = poem.author;
  document.getElementById('back-title').textContent = poem.title;
  document.getElementById('back-author').textContent = poem.author;
  document.getElementById('poem-text').textContent = poem.text;
  document.getElementById('full-poem-link').href = `poem.html?id=${encodeURIComponent(poem.id)}`;

  // Reset hint
  document.getElementById('first-line-preview').style.display = 'none';
  document.getElementById('hint-btn').style.display = 'inline-block';

}

function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('front-panel').style.display = 'none';
  document.getElementById('back-panel').classList.add('visible');
  document.querySelector('.poem-text-wrap').scrollTop = 0;
}

function showHint() {
  const poem = currentPoem();
  if (!poem) return;
  const firstLine = poem.text.split('\n').find(l => l.trim()) || '';
  document.getElementById('first-line-preview').textContent = '"' + firstLine + '"';
  document.getElementById('first-line-preview').style.display = 'block';
  document.getElementById('hint-btn').style.display = 'none';
}

function rate(rating) {
  const poem = currentPoem();
  if (!poem) return;

  const existing = progress[poem.id] || { status: 'new', interval: 1 };
  const next = computeNext(existing, rating);
  progress[poem.id] = { ...existing, ...next, reviews: (existing.reviews || 0) + 1 };
  saveProgress();

  sessionReviewed++;

  if (rating === 'again') {
    // Put back at end
    if (currentIdx < queue.length) {
      againQueue.push(queue[currentIdx]);
      currentIdx++;
    } else {
      const card = againQueue.shift();
      againQueue.push(card);
    }
  } else {
    if (currentIdx < queue.length) currentIdx++;
    else againQueue.shift();
  }

  showCard();
}

function showDone() {
  document.getElementById('study-view').style.display = 'none';
  document.getElementById('done-screen').classList.add('visible');
  document.getElementById('header-title').textContent = 'Done';
  document.getElementById('header-subtitle').textContent = '';
  document.getElementById('progress-strip-fill').style.width = '100%';

  const p = loadProgress();
  const known = poems.filter(x => (p[x.id] && p[x.id].status === 'known')).length;
  document.getElementById('done-sub').textContent =
    `You reviewed ${sessionReviewed} poem${sessionReviewed !== 1 ? 's' : ''}.\n${known} of ${poems.length} poems known.`;
}

function restartSession() {
  progress = loadProgress();
  currentIdx = 0;
  sessionReviewed = 0;
  againQueue = [];
  queue = browseAll ? [...poems] : poems.filter(p => isDue(p.id));
  if (queue.length === 0) {
    queue = [...poems]; // if all done, review everything
  }
  document.getElementById('done-screen').classList.remove('visible');
  document.getElementById('study-view').style.display = 'flex';
  showCard();
}

init();
</script>

</body>
</html>
