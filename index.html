<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>panorama.ink — A study companion for poems</title>

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#F7A900">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://panorama.ink/">
  <meta property="og:site_name" content="panorama.ink">
  <meta property="og:title" content="panorama.ink">
  <meta property="og:description" content="A study companion for poems">
  <meta property="og:image" content="https://panorama.ink/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="panorama.ink — A study companion for poems">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="panorama.ink">
  <meta name="twitter:description" content="A study companion for poems">
  <meta name="twitter:image" content="https://panorama.ink/twitter-card.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F5F7;
      --surface: #FFFFFF;
      --text: #1D1D1F;
      --text-secondary: #6E6E73;
      --accent: #007AFF;
      --border: #D2D2D7;
      --green: #30D158;
      --radius: 18px;
      --shadow: 0 2px 20px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
    }

    .header-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .progress-pill {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 11px;
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .progress-pill span {
      color: var(--green);
      font-weight: 600;
    }

    /* ── Featured couplet card ── */
    .hero {
      padding: 0 16px 4px;
    }

    .couplet-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 28px 28px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      position: relative;
      transition: box-shadow 0.2s;
    }

    .couplet-card:active {
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }

    .couplet-tag {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-secondary);
      margin-bottom: 18px;
    }

    .couplet-line1 {
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 22px;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 6px;
    }

    .couplet-line2 {
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 22px;
      line-height: 1.5;
      color: var(--text);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      margin-bottom: 6px;
    }

    .couplet-line2.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    .tap-prompt {
      font-size: 13px;
      color: var(--border);
      margin-top: 20px;
      transition: opacity 0.2s;
    }

    .tap-prompt.hidden { opacity: 0; }

    .couplet-footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s ease 0.1s, transform 0.3s ease 0.1s;
    }

    .couplet-footer.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    .couplet-byline {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .couplet-byline em {
      font-style: italic;
    }

    .couplet-read-link {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .refresh-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--border);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: color 0.15s, transform 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    .refresh-btn:active { color: var(--accent); transform: rotate(180deg); }

    /* ── Search ── */
    .search-section {
      padding: 20px 16px 4px;
    }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--text-secondary);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 12px 12px 40px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    .search-input::placeholder { color: var(--text-secondary); }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
    }

    /* ── Search results ── */
    .search-results {
      display: none;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-top: 8px;
      overflow: hidden;
    }

    .search-results.visible { display: block; }

    .search-result-item {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid var(--bg);
      text-decoration: none;
      color: inherit;
      gap: 10px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:active { background: var(--bg); }

    .result-info { flex: 1; min-width: 0; }

    .result-title {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-match {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-style: italic;
    }

    .result-author {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .no-results {
      padding: 20px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* ── CTA ── */
    .cta-section {
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-study {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-study:active { opacity: 0.85; }
    .btn-study.muted { background: var(--surface); color: var(--text-secondary); box-shadow: var(--shadow); font-size: 15px; font-weight: 500; }

    .due-chip {
      background: rgba(255,255,255,0.25);
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .btn-browse {
      display: block;
      padding: 14px;
      background: var(--surface);
      color: var(--text-secondary);
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      box-shadow: var(--shadow);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Stats row (discreet) ── */
    .stats-row {
      display: flex;
      gap: 6px;
      padding: 0 16px 4px;
    }

    .stat-chip {
      flex: 1;
      background: var(--surface);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .stat-chip-num {
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 2px;
    }

    .stat-chip-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--text-secondary);
    }

    .stat-chip.known .stat-chip-num { color: var(--green); }
    .stat-chip.learning .stat-chip-num { color: #FF9F0A; }
    .stat-chip.new .stat-chip-num { color: var(--text-secondary); }

    /* ── Footer attribution ── */
    .attribution {
      padding: 24px 20px 40px;
      text-align: center;
    }

    .attribution p {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .attribution a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-title">Panorama</div>
  <a class="progress-pill" href="library.html" id="progress-pill">— / — known</a>
</header>

<!-- Featured couplet -->
<div class="hero">
  <div class="couplet-card" id="couplet-card" onclick="handleCardTap(event)">
    <button class="refresh-btn" id="refresh-btn" onclick="event.stopPropagation(); pickCouplet(true)" title="New couplet">↺</button>
    <div class="couplet-tag" id="couplet-tag">Daily verse</div>
    <div class="couplet-line1" id="couplet-line1">…</div>
    <div class="couplet-line2" id="couplet-line2"></div>
    <div class="tap-prompt" id="tap-prompt">tap to continue</div>
    <div class="couplet-footer" id="couplet-footer">
      <div class="couplet-byline" id="couplet-byline"></div>
      <a class="couplet-read-link" id="couplet-read-link" href="#" onclick="event.stopPropagation()">read poem ↗</a>
    </div>
  </div>
</div>

<!-- Stats chips -->
<div class="stats-row" id="stats-row" style="margin-top:14px">
  <div class="stat-chip new">
    <div class="stat-chip-num" id="stat-new">—</div>
    <div class="stat-chip-label">New</div>
  </div>
  <div class="stat-chip learning">
    <div class="stat-chip-num" id="stat-learning">—</div>
    <div class="stat-chip-label">Learning</div>
  </div>
  <div class="stat-chip known">
    <div class="stat-chip-num" id="stat-known">—</div>
    <div class="stat-chip-label">Known</div>
  </div>
</div>

<!-- Search -->
<div class="search-section">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search-input" type="search" placeholder="Search poems or lines…" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="search-results" id="search-results"></div>
</div>

<!-- CTAs -->
<div class="cta-section">
  <a href="study.html" class="btn-study" id="btn-study">
    Study due couplets
    <span class="due-chip" id="due-chip" style="display:none">0</span>
  </a>
  <a href="library.html" class="btn-browse">Browse all poems</a>
</div>

<!-- Attribution -->
<div class="attribution">
  <p>
    This app is a personal study aid for<br>
    <em>Panorama: A Collection of Poems</em> (Oxford University Press).<br>
    <a href="https://india.oup.com/product/panorama-revised-edition-9780195620313/" target="_blank">→ Buy the book</a> — highly recommended for your shelf.
  </p>
</div>

<script>
const COUPLET_KEY = 'panorama_couplets_v1';
const POEM_KEY = 'panorama_v1';

let couplets = [];
let poems = [];
let featuredCouplet = null;
let revealed = false;

function loadCoupletProgress() {
  try { return JSON.parse(localStorage.getItem(COUPLET_KEY)) || {}; } catch { return {}; }
}

function getStatus(progress, id) {
  return (progress[id] && progress[id].status) || 'new';
}

function isDue(progress, id) {
  const c = progress[id];
  if (!c || c.status === 'new') return true;
  if (c.status === 'learning') return true;
  if (c.status === 'known') return Date.now() >= (c.nextReview || 0);
  return true;
}

function pickCouplet(forceNew) {
  if (!couplets.length) return;
  const progress = loadCoupletProgress();

  // Priority: learning > new > known
  const learning = couplets.filter(c => getStatus(progress, c.id) === 'learning');
  const newCards  = couplets.filter(c => getStatus(progress, c.id) === 'new');
  const pool = learning.length ? learning : newCards.length ? newCards : couplets;

  // Pick random from pool, avoiding the current one unless nothing else
  let pick;
  const filtered = pool.filter(c => !featuredCouplet || c.id !== featuredCouplet.id);
  pick = (filtered.length ? filtered : pool)[Math.floor(Math.random() * (filtered.length || pool.length))];

  featuredCouplet = pick;
  revealed = false;

  document.getElementById('couplet-line1').textContent = pick.line1;
  document.getElementById('couplet-line2').textContent = pick.line2;
  document.getElementById('couplet-line2').classList.remove('revealed');
  document.getElementById('couplet-footer').classList.remove('revealed');
  document.getElementById('tap-prompt').classList.remove('hidden');

  const tag = getStatus(progress, pick.id);
  document.getElementById('couplet-tag').textContent =
    tag === 'known' ? 'Review' :
    tag === 'learning' ? 'Still learning' :
    'Daily verse';

  document.getElementById('couplet-byline').innerHTML =
    `<em>${escHtml(pick.poemTitle)}</em> &mdash; ${escHtml(pick.author)}`;
  document.getElementById('couplet-read-link').href = `poem.html?id=${encodeURIComponent(pick.poemId)}`;
}

function handleCardTap(e) {
  if (revealed) return;
  revealed = true;
  document.getElementById('couplet-line2').classList.add('revealed');
  document.getElementById('couplet-footer').classList.add('revealed');
  document.getElementById('tap-prompt').classList.add('hidden');
}

async function init() {
  const [c, p] = await Promise.all([
    fetch('couplets.json').then(r => r.json()),
    fetch('poems.json').then(r => r.json())
  ]);
  couplets = c;
  poems = p;

  const progress = loadCoupletProgress();

  const counts = { new: 0, learning: 0, known: 0 };
  let due = 0;
  couplets.forEach(c => {
    const s = getStatus(progress, c.id);
    counts[s]++;
    if (isDue(progress, c.id)) due++;
  });

  document.getElementById('stat-new').textContent = counts.new;
  document.getElementById('stat-learning').textContent = counts.learning;
  document.getElementById('stat-known').textContent = counts.known;

  // Header pill — show poem-level known count
  const poemProgress = (() => { try { return JSON.parse(localStorage.getItem(POEM_KEY)) || {}; } catch { return {}; }})();
  const poemsKnown = poems.filter(p => poemProgress[p.id] && poemProgress[p.id].status === 'known').length;
  const pill = document.getElementById('progress-pill');
  pill.innerHTML = `<span>${poemsKnown}</span> / ${poems.length}`;

  // Due chip
  if (due > 0) {
    const chip = document.getElementById('due-chip');
    chip.textContent = due.toLocaleString();
    chip.style.display = '';
  } else {
    document.getElementById('btn-study').textContent = 'All caught up ✓';
    document.getElementById('btn-study').classList.add('muted');
    document.getElementById('btn-study').style.pointerEvents = 'none';
  }

  pickCouplet();
  initSearch();
}

function initSearch() {
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q) {
      results.classList.remove('visible');
      return;
    }

    const hits = [];
    for (const poem of poems) {
      const titleMatch = poem.title.toLowerCase().includes(q);
      const authorMatch = poem.author.toLowerCase().includes(q);
      const lineMatch = poem.text.toLowerCase().includes(q);

      if (titleMatch || authorMatch || lineMatch) {
        // Find matching line if it's a text match
        let matchLine = '';
        if (lineMatch && !titleMatch) {
          const lines = poem.text.split('\n');
          const ml = lines.find(l => l.toLowerCase().includes(q));
          if (ml) matchLine = ml.trim();
        }
        hits.push({ poem, matchLine });
        if (hits.length >= 8) break;
      }
    }

    if (!hits.length) {
      results.innerHTML = `<div class="no-results">No poems found</div>`;
    } else {
      results.innerHTML = hits.map(({ poem, matchLine }) => `
        <a class="search-result-item" href="poem.html?id=${encodeURIComponent(poem.id)}">
          <div class="result-info">
            <div class="result-title">${highlightMatch(escHtml(poem.title), q)}</div>
            ${matchLine
              ? `<div class="result-match">"${highlightMatch(escHtml(matchLine), q)}"</div>`
              : `<div class="result-author">${escHtml(poem.author)}</div>`}
          </div>
          <span style="color:var(--border)">›</span>
        </a>
      `).join('');
    }

    results.classList.add('visible');
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      input.value = '';
      results.classList.remove('visible');
    }
  });

  // Hide results on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-section')) {
      results.classList.remove('visible');
    }
  });
}

function highlightMatch(html, q) {
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  return html.replace(re, m => `<mark style="background:#FFF176;border-radius:2px">${m}</mark>`);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>

</body>
</html>
